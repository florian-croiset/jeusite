<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo - Profil Sécurisé</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css"> <style>
        .profile-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 208, 198, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .user-info {
            margin-top: 2rem;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
        }
        .info-label { color: #808080; font-size: 0.8rem; margin-bottom: 4px; }
        .info-value { font-family: monospace; color: var(--debut); margin-bottom: 1rem; word-break: break-all; }
        .logout-btn {
            margin-top: 2rem;
            width: 100%;
            padding: 12px;
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--bug);
            color: var(--bug);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover { background: var(--bug); color: white; }
    </style>
</head>
<body>
    <div class="custom-cursor" id="customCursor"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/config/supabase.js"></script>
    <script type="module" src="js/database.js"></script>
    <script src="js/ip-detection.js"></script>
    <script type="module" src="js/discord-webhook.js"></script>
    <script src="js/discord-tracker.js"></script>
    <script src="js/ui/cursor.js"></script>
    <script type="module" src="js/remote-refresh.js"></script>

    <div class="profile-container">
        <div id="loader">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--debut);"></i>
            <p style="margin-top: 1rem;">Accès sécurisé en cours...</p>
        </div>

        <div id="profile-content" style="display: none;">
            <i class="fas fa-user-shield" style="font-size: 3rem; color: var(--debut);"></i>
            <h1 style="margin-top: 1rem;">Espace Personnel</h1>
            
            <div class="user-info">
                <div class="info-label">ID UTILISATEUR</div>
                <div id="display-id" class="info-value">-</div>

                <div class="info-label">EMAIL</div>
                <div id="display-email" class="info-value">-</div>
                
                <div class="info-label">STATUT DE SESSION</div>
                <div class="info-value" style="color: #00ff88;"><i class="fas fa-check-circle"></i> Authentifié via EchoDB</div>
            </div>

            <button class="logout-btn" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </button>
        </div>
    </div>

    <script>
        // Utilisation de la même logique de vérification que roadmap.html
        async function waitForEchoDB() {
            while (!window.EchoDB || !window.EchoDB.Auth) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
        }

        async function initProfile() {
            try {
                await waitForEchoDB();
                
                const user = await window.EchoDB.Auth.getCurrentUser();
                
                if (!user) {
                    console.warn("Utilisateur non connecté, redirection...");
                    window.location.href = 'index.html';
                    return;
                }

                // Remplissage des données
                document.getElementById('display-id').textContent = user.id;
                document.getElementById('display-email').textContent = user.email;

                // Affichage de l'interface
                document.getElementById('loader').style.display = 'none';
                document.getElementById('profile-content').style.display = 'block';

            } catch (err) {
                console.error("Erreur d'initialisation :", err);
                document.getElementById('loader').innerHTML = `<p style="color:var(--bug)">Erreur de connexion.</p>`;
            }
        }

        window.handleLogout = async function() {
            if (window.EchoDB && window.EchoDB.Auth) {
                await window.EchoDB.Auth.signOut();
                window.location.href = 'index.html';
            }
        };

        document.addEventListener('DOMContentLoaded', initProfile);
    </script>
</body>
</html>
