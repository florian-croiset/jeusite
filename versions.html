<!doctype html><html lang="fr"><head><script defer src="https://cdn.vercel-insights.com/v1/script.js"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Echo – Changelog</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="icon" href="assets/favicon.ico" type="image/x-icon"><script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.4/marked.min.js"></script><script src="js/ip-detection.js"></script><script type="module" src="js/discord-webhook.js"></script><script src="js/discord-tracker.js"></script><script type="module" src="js/remote-refresh.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}:root{--debut:#00d0c6;--fin:#005867;--finn:#8735b9}body{font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;background:#0a0a0a;color:#e0e0e0}header{text-align:center;padding:3rem 1rem 1rem;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.1);box-shadow:0 5px 20px rgba(0,0,0,.3);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}header h1{font-size:3rem;background:linear-gradient(135deg,var(--debut),var(--fin),var(--finn));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;background-size:300%;animation:headerGradient 6s linear infinite}header p{color:#b0b0b0;margin-top:.5rem}@keyframes headerGradient{0%{background-position:0 50%}100%{background-position:300% 50%}}.changelog-container{max-width:800px;margin:3rem auto 6rem;padding:0 1.5rem}.empty-state,.loading-state{text-align:center;color:grey;padding:3rem 0}.version-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:2rem;margin-bottom:2rem;position:relative}.version-card.latest-version{box-shadow:0 0 40px rgba(0,208,198,.6);border:2px solid var(--debut)}.version-card.latest-version::after{content:"Version actuelle";position:absolute;top:-1px;left:-1px;padding:5px 10px;background:var(--debut);color:#0a0a0a;font-size:.75rem;font-weight:700;border-radius:15px 0 15px 0}.version-header{display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;margin-bottom:.3rem}.version-title{font-size:1.8rem;background:linear-gradient(135deg,var(--debut),var(--fin),var(--finn));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}.version-date{font-size:.9rem;color:grey}.version-subtitle{color:#b0b0b0;font-style:italic;margin-bottom:1rem}.version-notes ul{padding-left:1.3rem;margin:.5rem 0}.version-notes li{color:#b0b0b0;margin-bottom:.4rem}.version-notes p{color:#b0b0b0;margin-bottom:.5rem}.version-notes a{color:var(--debut)}.version-notes code{background:rgba(255,255,255,.08);padding:.1rem .4rem;border-radius:4px;font-size:.9em}.no-notes{color:#666;font-style:italic}.version-download{display:inline-flex;align-items:center;gap:.5rem;margin-top:1rem;padding:.6rem 1.2rem;border:2px solid var(--debut);background:rgba(0,208,198,.1);color:var(--debut);border-radius:8px;text-decoration:none;font-weight:600;transition:all .3s}.version-download:hover{background:var(--debut);color:#0a0a0a}footer{text-align:center;padding:2rem;background:rgba(0,0,0,.4);border-top:1px solid rgba(255,255,255,.1);color:grey}a.back-btn{position:fixed;bottom:2rem;right:2rem;width:60px;height:60px;border-radius:50%;border:2px solid rgba(102,126,234,.3);background:rgba(10,10,10,.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;box-shadow:0 5px 20px rgba(0,0,0,.3);transition:all .3s;text-decoration:none;z-index:1000}a.back-btn i{color:var(--debut);font-size:1.4rem}a.back-btn:hover{transform:scale(1.1);border-color:var(--finn);box-shadow:0 10px 25px rgba(102,126,234,.3)}@media (max-width:768px){header h1{font-size:2.2rem}}</style></head><body><header><h1>Changelog</h1><p><i class="fa-solid fa-code-branch"></i> Journal des versions du jeu <strong>Echo</strong></p></header><main class="changelog-container" id="changelog-container"><p class="loading-state">Chargement des versions...</p></main><footer><p>&copy; <span id="current-year">2025</span> Echo – Changelog</p></footer><a href="index.html" class="back-btn" title="Retour au site principal"><i class="fa-solid fa-arrow-left"></i></a><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script type="module" src="js/config/supabase.js"></script><script>function escapeHtml(e){return e?String(e).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"):""}function waitForEchoDB(){return new Promise(e=>{window.EchoDB?e():window.addEventListener("EchoDBReady",e,{once:!0})})}function renderVersion(e,n){const r=e.release_date?new Date(e.release_date).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}):"";let t="";Array.isArray(e.changelog)&&e.changelog.length?t=e.changelog.map(e=>/^[-*]/.test(e.trim())?e:`- ${e}`).join("\n"):e.description&&(t=e.description);const a=t?marked.parse(escapeHtml(t)):'<p class="no-notes">Aucune note de version.</p>',o=e.download_url?`<a href="${escapeHtml(e.download_url)}" class="version-download" target="_blank" rel="noopener noreferrer">\n                     <i class="fa-solid fa-download"></i> Télécharger${e.file_size?` (${escapeHtml(e.file_size)})`:""}\n                   </a>`:"";return`\n                <article class="version-card ${n?"latest-version":""}">\n                    <div class="version-header">\n                        <h2 class="version-title">v${escapeHtml(e.version)}</h2>\n                        ${r?`<span class="version-date">${r}</span>`:""}\n                    </div>\n                    ${e.title?`<p class="version-subtitle">${escapeHtml(e.title)}</p>`:""}\n                    <div class="version-notes">${a}</div>\n                    ${o}\n                </article>\n            `}async function loadChangelog(){const e=document.getElementById("changelog-container");try{await waitForEchoDB();const n=(await window.EchoDB.GameVersions.getAll()).filter(e=>e.is_published);if(!n.length)return void(e.innerHTML='<p class="empty-state">Aucune version publiée pour le moment.</p>');e.innerHTML=n.map((e,n)=>renderVersion(e,0===n)).join("")}catch(n){console.error("Erreur chargement changelog:",n),e.innerHTML='<p class="empty-state">Erreur lors du chargement des versions.</p>'}}document.addEventListener("DOMContentLoaded",()=>{document.getElementById("current-year").textContent=(new Date).getFullYear(),loadChangelog()})</script></body></html>
