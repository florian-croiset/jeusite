<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo - Roadmap</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        :root {
            --debut: #00d0c6;
            --fin: #005867;
            --finn: #8735b9;
            --feature: #00ff88;
            --bug: #ff0055;
            --design: #ffaa00;
        }

        /* Header */
        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--debut), var(--fin), var(--finn));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        header p {
            color: #b0b0b0;
            font-size: 1.1rem;
        }

        /* Filters */
        .filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem auto;
            flex-wrap: wrap;
            max-width: 1200px;
            padding: 0 1rem;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #b0b0b0;
            border-radius: 25px;
            /*cursor: pointer;*/
            transition: all 0.3s;
            font-weight: 600;
        }

        .filter-btn:hover {
            border-color: var(--debut);
            color: var(--debut);
        }

        .filter-btn.active {
            border-color: var(--debut);
            background: rgba(0, 208, 198, 0.2);
            color: var(--debut);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        /* Status Columns */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .status-column {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
        }

        .status-column h2 {
            color: var(--debut);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.3rem;
        }

        .status-column h2 .count {
            background: rgba(0, 208, 198, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.9rem;
        }

        /* Roadmap Item */
        .roadmap-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            /*cursor: pointer;*/
            transition: all 0.3s;
        }

        .roadmap-item:hover {
            border-color: var(--debut);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 208, 198, 0.3);
        }

        .roadmap-item.priority-high {
            border-left: 4px solid #ff0055;
        }

        .roadmap-item.priority-medium {
            border-left: 4px solid #ffaa00;
        }

        .roadmap-item.priority-low {
            border-left: 4px solid #00ff88;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .item-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e0e0e0;
            flex: 1;
        }

        .item-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.3rem 0.7rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge.feature {
            background: rgba(0, 255, 136, 0.2);
            color: var(--feature);
            border: 1px solid var(--feature);
        }

        .badge.bug {
            background: rgba(255, 0, 85, 0.2);
            color: var(--bug);
            border: 1px solid var(--bug);
        }

        .badge.design {
            background: rgba(255, 170, 0, 0.2);
            color: var(--design);
            border: 1px solid var(--design);
        }

        .badge.other {
            background: rgba(135, 53, 185, 0.2);
            color: var(--finn);
            border: 1px solid var(--finn);
        }

        .item-description {
            color: #b0b0b0;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar-container {
            flex: 1;
            margin-right: 1rem;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--debut), var(--finn));
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 0.75rem;
            color: #808080;
            margin-top: 0.3rem;
        }

        .vote-btn {
            padding: 0.5rem 1rem;
            background: rgba(0, 208, 198, 0.1);
            border: 1px solid var(--debut);
            border-radius: 8px;
            color: var(--debut);
            /*cursor: pointer;*/
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .vote-btn:hover {
            background: var(--debut);
            color: #0a0a0a;
        }

        .vote-btn.voted {
            background: var(--debut);
            color: #0a0a0a;
        }

        /* Back Button */
        a.back-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            text-decoration: none;
            z-index: 1000;
        }

        a.back-btn i {
            color: var(--debut);
            font-size: 1.4rem;
        }

        a.back-btn:hover {
            transform: scale(1.1);
            border-color: var(--finn);
        }

        /* Mobile */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5rem;
            }

            .status-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Animations pour les votes */
        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-40px);
            }
        }

        .vote-btn {
            position: relative;
            overflow: visible;
        }

        .vote-btn i {
            transition: all 0.3s ease;
        }

        .vote-btn:active i {
            transform: scale(0.9);
        }


        /* Bouton suggestion */
        .suggest-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin: 0 auto 2rem;
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, rgba(0, 208, 198, 0.15), rgba(135, 53, 185, 0.15));
            border: 2px solid rgba(0, 208, 198, 0.4);
            border-radius: 25px;
            color: var(--debut);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggest-btn:hover {
            background: linear-gradient(135deg, rgba(0, 208, 198, 0.3), rgba(135, 53, 185, 0.3));
            border-color: var(--debut);
            transform: translateY(-2px);
        }

        /* Modal suggestion */
        .suggest-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .suggest-modal-overlay.open {
            display: flex;
        }

        .suggest-modal {
            background: #12121f;
            border: 1px solid rgba(0, 208, 198, 0.3);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            position: relative;
        }

        .suggest-modal h3 {
            font-size: 1.4rem;
            color: var(--debut);
            margin-bottom: 1.5rem;
        }

        .suggest-modal .form-group {
            margin-bottom: 1.2rem;
        }

        .suggest-modal label {
            display: block;
            font-size: 0.85rem;
            color: #b0b0b0;
            margin-bottom: 0.4rem;
        }

        .suggest-modal input,
        .suggest-modal textarea,
        .suggest-modal select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .suggest-modal input:focus,
        .suggest-modal textarea:focus,
        .suggest-modal select:focus {
            outline: none;
            border-color: var(--debut);
        }

        .suggest-modal textarea {
            resize: vertical;
            min-height: 100px;
        }

        .suggest-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .suggest-modal .btn-cancel {
            padding: 0.7rem 1.4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #b0b0b0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggest-modal .btn-submit {
            padding: 0.7rem 1.4rem;
            background: linear-gradient(135deg, var(--debut), var(--finn));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .suggest-modal .btn-submit:hover {
            opacity: 0.85;
        }

        .suggest-modal .close-x {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            font-size: 1.4rem;
            color: #808080;
            cursor: pointer;
            background: none;
            border: none;
        }

        .suggest-success {
            text-align: center;
            padding: 1rem 0;
            color: #00ff88;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="custom-cursor" id="customCursor"></div>
    <header>
        <h1><i class="fas fa-map-signs"></i> Roadmap</h1>
        <p>Suivez l'évolution du projet Echo et votez pour vos features préférées</p>
    </header>

    <!-- Filters -->
    <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="filterItems('all')">
            <i class="fas fa-border-all"></i> Tout
        </button>
        <button class="filter-btn" data-filter="feature" onclick="filterItems('feature')">
            <i class="fas fa-star"></i> Features
        </button>
        <button class="filter-btn" data-filter="bug" onclick="filterItems('bug')">
            <i class="fas fa-bug"></i> Bugs
        </button>
        <button class="filter-btn" data-filter="design" onclick="filterItems('design')">
            <i class="fas fa-palette"></i> Design
        </button>
        <button class="filter-btn" data-filter="other" onclick="filterItems('other')">
            <i class="fas fa-ellipsis-h"></i> Autre
        </button>
    </div>

    <!-- Bouton suggestion -->
    <div style="text-align:center; margin-top: 0.5rem;">
        <button class="suggest-btn" onclick="openSuggestModal()">
            <i class="fas fa-lightbulb"></i> Suggérer un ajout
        </button>
    </div>

    <!-- Modal suggestion -->
    <div class="suggest-modal-overlay" id="suggest-modal-overlay">
        <div class="suggest-modal">
            <button class="close-x" onclick="closeSuggestModal()">×</button>
            <h3>💡 Suggérer un ajout</h3>
            <div id="suggest-form-wrap">
                <div id="suggest-fields">
                    <div class="form-group">
                        <label>Titre *</label>
                        <input type="text" id="sg-title" placeholder="Ex: Mode multijoueur en ligne" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label>Description <small style="color:#808080;">(500 caractères max)</small></label>
                        <textarea id="sg-description" placeholder="Décris ta suggestion..." maxlength="500"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Catégorie</label>
                        <select id="sg-category">
                            <option value="feature">⭐ Feature</option>
                            <option value="bug">🐛 Bug</option>
                            <option value="design">🎨 Design</option>
                            <option value="other">📦 Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ton prénom <small style="color:#808080;">(optionnel)</small></label>
                        <input type="text" id="sg-name" placeholder="Florian" maxlength="50">
                    </div>
                </div>
                <div id="suggest-footer" class="suggest-modal-footer">
                    <button class="btn-cancel" onclick="closeSuggestModal()">Annuler</button>
                    <button class="btn-submit" onclick="submitSuggestion()">
                        <i class="fas fa-paper-plane"></i> Envoyer
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="status-grid" id="roadmap-container">
            <!-- Content will be injected here -->
        </div>
    </div>

    <a href="index.html" class="back-btn" title="Retour au site">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/config/supabase.js"></script>
    <script type="module" src="js/database.js"></script>
    <script>
        let currentFilter = 'all';
        let roadmapData = [];
        let userVotes = new Set();

        // Attendre EchoDB
        async function waitForEchoDB() {
            return new Promise((resolve) => {
                const check = setInterval(() => {
                    if (window.EchoDB) {
                        clearInterval(check);
                        resolve();
                    }
                }, 100);
            });
        }

        // Load roadmap
        async function loadRoadmap() {
            await waitForEchoDB();

            try {
                const { data, error } = await window.EchoDB.supabase
                    .from('roadmap_items')
                    .select('*')
                    .order('order_index', { ascending: true });

                if (error) {
                    console.error('Erreur Supabase:', error);
                    throw error;
                }

                roadmapData = data || [];
                await loadUserVotes();
                renderRoadmap();
            } catch (error) {
                console.error('Erreur chargement roadmap:', error);
                // Réessayer après 2 secondes en cas d'erreur réseau
                setTimeout(loadRoadmap, 2000);
            }
        }

        // Load user votes
        async function loadUserVotes() {
            try {
                const user = await window.EchoDB.Auth.getCurrentUser();
                if (!user) return;

                const { data } = await window.EchoDB.supabase
                    .from('roadmap_votes')
                    .select('roadmap_item_id')
                    .eq('user_id', user.id);

                userVotes = new Set(data?.map(v => v.roadmap_item_id) || []);
            } catch (error) {
                console.log('Non connecté');
            }
        }

        // Render roadmap
        function renderRoadmap() {
            const statuses = {
                planned: { title: '📋 Planifié', icon: 'clipboard-list' },
                in_progress: { title: '⚙️ En cours', icon: 'cog' },
                completed: { title: '✅ Terminé', icon: 'check-circle' }
            };

            const container = document.getElementById('roadmap-container');
            container.innerHTML = '';

            Object.keys(statuses).forEach(status => {
                const items = roadmapData.filter(item =>
                    item.status === status &&
                    (currentFilter === 'all' || item.category === currentFilter)
                );

                const column = document.createElement('div');
                column.className = 'status-column';
                column.innerHTML = `
                    <h2>
                        <i class="fas fa-${statuses[status].icon}"></i>
                        ${statuses[status].title}
                        <span class="count">${items.length}</span>
                    </h2>
                    <div class="items-container">
                        ${items.map(item => renderItem(item)).join('')}
                    </div>
                `;

                container.appendChild(column);
            });
        }

        // Render single item
        function renderItem(item) {
            const hasVoted = userVotes.has(item.id);
            const priority = item.priority === 2 ? 'high' : item.priority === 1 ? 'medium' : 'low';

            return `
                <div class="roadmap-item priority-${priority}" data-id="${item.id}" data-category="${item.category}">
                    <div class="item-header">
                        <div class="item-title">${item.title}</div>
                        <div class="item-badges">
                            <span class="badge ${item.category}">${item.category}</span>
                        </div>
                    </div>
                    ${item.description ? `<div class="item-description">${item.description}</div>` : ''}
                    <div class="item-footer">
                        <div class="progress-bar-container">
                            <div class="progress-bar">
                                <div class="progress-bar-fill" style="width: ${item.progress}%"></div>
                            </div>
                            <div class="progress-text">${item.progress}% complété</div>
                        </div>
                        <button class="vote-btn ${hasVoted ? 'voted' : ''}" onclick="voteForItem('${item.id}', event)">
                            <i class="fas fa-thumbs-up"></i>
                            ${item.votes || 0}
                        </button>
                    </div>
                </div>
            `;
        }

        // Filter items
        function filterItems(category) {
            currentFilter = category;

            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-filter="${category}"]`).classList.add('active');

            renderRoadmap();
        }

        // Vote for item avec effet visuel
        window.voteForItem = async function (itemId, event) {
            event.stopPropagation();

            const button = event.currentTarget;
            const voteCountSpan = button.querySelector('span') || button.lastChild;
            const currentCount = parseInt(voteCountSpan.textContent) || 0;
            const hasVoted = userVotes.has(itemId);

            // Effet visuel immédiat
            button.style.transform = 'scale(1.2)';
            button.style.transition = 'all 0.3s ease';

            setTimeout(() => {
                button.style.transform = 'scale(1)';
            }, 300);

            // Animation du compteur
            const icon = button.querySelector('i');
            icon.style.animation = 'pulse 0.5s ease';
            setTimeout(() => {
                icon.style.animation = '';
            }, 500);

            // Mise à jour optimiste de l'UI
            if (hasVoted) {
                button.classList.remove('voted');
                voteCountSpan.textContent = currentCount - 1;
            } else {
                button.classList.add('voted');
                voteCountSpan.textContent = currentCount + 1;

                // Animation "+1" qui flotte
                const plusOne = document.createElement('div');
                plusOne.textContent = '+1';
                plusOne.style.cssText = `
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--debut);
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        `;
                button.style.position = 'relative';
                button.appendChild(plusOne);

                setTimeout(() => plusOne.remove(), 1000);
            }

            try {
                const user = await window.EchoDB.Auth.getCurrentUser();
                if (!user) {
                    alert('Vous devez être connecté pour voter');
                    // Annuler la mise à jour optimiste
                    if (hasVoted) {
                        button.classList.add('voted');
                        voteCountSpan.textContent = currentCount;
                    } else {
                        button.classList.remove('voted');
                        voteCountSpan.textContent = currentCount;
                    }
                    return;
                }

                // Vérifier l'IP
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipResponse.json();

                // Vérifier si cette IP a déjà voté pour cet item
                const { data: ipVote } = await window.EchoDB.supabase
                    .from('roadmap_votes')
                    .select('id')
                    .eq('roadmap_item_id', itemId)
                    .eq('ip_address', ip)
                    .maybeSingle();

                if (ipVote && !hasVoted) {
                    alert('⚠️ Vous avez déjà voté pour cet élément depuis cette connexion');
                    // Annuler la mise à jour optimiste
                    button.classList.remove('voted');
                    voteCountSpan.textContent = currentCount;
                    return;
                }

                // Vérifier si l'utilisateur a déjà voté
                const { data: existingVote } = await window.EchoDB.supabase
                    .from('roadmap_votes')
                    .select('id')
                    .eq('roadmap_item_id', itemId)
                    .eq('user_id', user.id)
                    .maybeSingle();

                if (existingVote) {
                    // Retirer le vote
                    const { error: deleteError } = await window.EchoDB.supabase
                        .from('roadmap_votes')
                        .delete()
                        .eq('id', existingVote.id);

                    if (deleteError) throw deleteError;

                    // Décrémenter
                    const { error: rpcError } = await window.EchoDB.supabase
                        .rpc('decrement_votes', { item_id: itemId });

                    if (rpcError) throw rpcError;

                    userVotes.delete(itemId);
                } else {
                    // Ajouter le vote avec IP
                    const { error: insertError } = await window.EchoDB.supabase
                        .from('roadmap_votes')
                        .insert({
                            roadmap_item_id: itemId,
                            user_id: user.id,
                            ip_address: ip
                        });

                    if (insertError) throw insertError;

                    // Incrémenter
                    const { error: rpcError } = await window.EchoDB.supabase
                        .rpc('increment_votes', { item_id: itemId });

                    if (rpcError) throw rpcError;

                    userVotes.add(itemId);
                }

                // Recharger pour synchroniser
                await loadRoadmap();
            } catch (error) {
                console.error('Erreur vote:', error);
                alert('Erreur lors du vote: ' + (error.message || 'Erreur réseau'));

                // Annuler la mise à jour optimiste en cas d'erreur
                if (hasVoted) {
                    button.classList.add('voted');
                    voteCountSpan.textContent = currentCount;
                } else {
                    button.classList.remove('voted');
                    voteCountSpan.textContent = currentCount;
                }
            }
        };

        // Init
        document.addEventListener('DOMContentLoaded', loadRoadmap);

        // ===== SUGGESTIONS =====

        // Anti-spam : 1 suggestion par session + délai entre envois
        //const SUGGEST_COOLDOWN_MS = 60 * 1000; // 1 minute
        const SUGGEST_COOLDOWN_MS = 1000; // 1 minute
        let _lastSuggestTime = 0;
        let _suggestCount = 0;
        //const SUGGEST_MAX_PER_SESSION = 3;
        const SUGGEST_MAX_PER_SESSION = 15;

        // Sanitisation XSS basique (pas d'innerHTML avec données utilisateur)
        function sanitizeText(str, maxLen) {
            if (!str) return '';
            return String(str).trim().slice(0, maxLen);
        }

        // Validation stricte de la catégorie
        const ALLOWED_CATEGORIES = ['feature', 'bug', 'design', 'other'];

        window.openSuggestModal = function () {
            document.getElementById('suggest-modal-overlay').classList.add('open');
            document.getElementById('sg-title').focus();
        };

        window.closeSuggestModal = function () {
            document.getElementById('suggest-modal-overlay').classList.remove('open');
            resetSuggestForm();
        };

        function resetSuggestForm() {
            const wrap = document.getElementById('suggest-form-wrap');
            // Vider les champs sans recréer le HTML via innerHTML
            const titleInput = document.getElementById('sg-title');
            const descInput = document.getElementById('sg-description');
            const nameInput = document.getElementById('sg-name');
            const catSelect = document.getElementById('sg-category');
            if (titleInput) { titleInput.value = ''; titleInput.style.borderColor = ''; }
            if (descInput) descInput.value = '';
            if (nameInput) nameInput.value = '';
            if (catSelect) catSelect.value = 'feature';
            // Réafficher le formulaire si on était sur l'écran succès
            wrap.style.display = '';
            const successEl = document.getElementById('suggest-success-screen');
            if (successEl) successEl.remove();
            const formFields = document.getElementById('suggest-fields');
            if (formFields) formFields.style.display = '';
            const footer = document.getElementById('suggest-footer');
            if (footer) footer.style.display = '';
        }

        // Fermer en cliquant l'overlay
        document.getElementById('suggest-modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) closeSuggestModal();
        });

        // Fermer avec Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSuggestModal();
        });

        window.submitSuggestion = async function () {
            await waitForEchoDB();

            // ── Anti-spam session ──
            if (_suggestCount >= SUGGEST_MAX_PER_SESSION) {
                showSuggestError('Limite atteinte : 3 suggestions maximum par session.');
                return;
            }
            const now = Date.now();
            if (now - _lastSuggestTime < SUGGEST_COOLDOWN_MS) {
                const remaining = Math.ceil((SUGGEST_COOLDOWN_MS - (now - _lastSuggestTime)) / 1000);
                showSuggestError(`Veuillez patienter ${remaining}s avant d'envoyer une nouvelle suggestion.`);
                return;
            }

            // ── Récupération et sanitisation ──
            const rawTitle = document.getElementById('sg-title').value;
            const rawDesc = document.getElementById('sg-description').value;
            const rawName = document.getElementById('sg-name').value;
            const rawCat = document.getElementById('sg-category').value;

            const title = sanitizeText(rawTitle, 100);
            const description = sanitizeText(rawDesc, 500);
            const name = sanitizeText(rawName, 50);
            const category = ALLOWED_CATEGORIES.includes(rawCat) ? rawCat : 'feature';

            // ── Validation ──
            if (!title || title.length < 3) {
                document.getElementById('sg-title').style.borderColor = '#ff4757';
                document.getElementById('sg-title').focus();
                showSuggestError('Le titre doit faire au moins 3 caractères.');
                return;
            }

            // Détection contenu suspicieux (URLs, balises)
            const suspiciousPattern = /<|>|javascript:|data:|vbscript:|on\w+\s*=/i;
            if (suspiciousPattern.test(title) || suspiciousPattern.test(description) || suspiciousPattern.test(name)) {
                showSuggestError('Contenu non autorisé détecté.');
                return;
            }

            const btn = document.querySelector('#suggest-footer .btn-submit');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }

            try {
                const { error } = await window.EchoDB.supabase
                    .from('roadmap_suggestions')
                    .insert({
                        title,
                        description: description || null,
                        category,
                        author_name: name || null,
                        status: 'pending'
                    });

                if (error) throw error;

                // Mise à jour anti-spam
                _lastSuggestTime = Date.now();
                _suggestCount++;

                // ── Écran succès (sans innerHTML avec données user) ──
                const fields = document.getElementById('suggest-fields');
                const footer = document.getElementById('suggest-footer');
                if (fields) fields.style.display = 'none';
                if (footer) footer.style.display = 'none';

                const success = document.createElement('div');
                success.id = 'suggest-success-screen';
                success.className = 'suggest-success';
                success.style.cssText = 'text-align:center;padding:1rem 0;';

                const icon = document.createElement('div');
                icon.style.cssText = 'font-size:3rem;margin-bottom:1rem;';
                icon.textContent = '✅';

                const title2 = document.createElement('div');
                title2.style.cssText = 'font-size:1.2rem;font-weight:600;margin-bottom:0.5rem;color:#00ff88;';
                title2.textContent = 'Suggestion envoyée !';

                const sub = document.createElement('div');
                sub.style.cssText = 'color:#b0b0b0;font-size:0.95rem;';
                sub.textContent = 'Merci ! Elle sera examinée prochainement.';

                const closeBtn = document.createElement('button');
                closeBtn.className = 'btn-cancel';
                closeBtn.style.marginTop = '1.5rem';
                closeBtn.textContent = 'Fermer';
                closeBtn.addEventListener('click', closeSuggestModal);

                success.append(icon, title2, sub, closeBtn);
                document.getElementById('suggest-form-wrap').appendChild(success);

            } catch (err) {
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer'; }
                showSuggestError('Erreur : ' + err.message);
            }
        };

        function showSuggestError(msg) {
            let errEl = document.getElementById('suggest-error');
            if (!errEl) {
                errEl = document.createElement('div');
                errEl.id = 'suggest-error';
                errEl.style.cssText = 'color:#ff4757;font-size:13px;margin-bottom:10px;padding:8px 12px;background:rgba(255,71,87,0.1);border-radius:6px;border:1px solid rgba(255,71,87,0.3);';
                const footer = document.getElementById('suggest-footer');
                if (footer) footer.before(errEl);
            }
            errEl.textContent = msg; // textContent — pas d'injection possible
            setTimeout(() => errEl?.remove(), 4000);
        }
    </script>
    <script src="js/ip-detection.js"></script>
    <script type="module" src="js/discord-webhook.js"></script>
    <script src="js/discord-tracker.js"></script>
    <script src="js/ui/cursor.js"></script>
    <script type="module" src="js/remote-refresh.js"></script>
</body>
